[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dsl-validate"
version = "0.1.0"
description = "DSL and workflow validation pipeline with structured issues for NLP2DSL"
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
dependencies = [
    "dsl-contracts>=0.1.0",
    "env2llm>=0.1.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/dsl_validate"]

[tool.pytest.ini_options]
testpaths = ["tests"]
