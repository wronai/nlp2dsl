services:

  # ── API Gateway + Workflow Engine ────────────────────────────
  backend:
    build: ./backend
    ports:
      - "${NLP2DSL_BACKEND_HOST_PORT:-8010}:8000"
    environment:
      - WORKER_URL=http://worker:8000
      - NLP_SERVICE_URL=http://nlp-service:8002
      - POSTGRES_URL=postgresql://app:app@postgres:5432/automation
      - NLP2DSL_EXAMPLES_MOUNT=/examples
    depends_on:
      postgres:
        condition: service_healthy
      worker:
        condition: service_started
      nlp-service:
        condition: service_started
    volumes:
      - ./examples:/examples:ro
    restart: unless-stopped

  # ── NLP → DSL Pipeline (LiteLLM) ────────────────────────────
  nlp-service:
    build: ./nlp-service
    ports:
      - "${NLP2DSL_NLP_HOST_PORT:-8012}:8002"
    environment:
      # ── LLM Provider (odkomentuj JEDNĄ sekcję) ──────────────

      # OpenRouter (domyślny)
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-openrouter/openai/gpt-5-mini}

      # OpenAI
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      # - LLM_MODEL=gpt-4o-mini

      # Anthropic
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # - LLM_MODEL=claude-sonnet-4-20250514

      # Ollama (lokalny)
      # - OLLAMA_API_BASE=http://ollama:11434
      # - LLM_MODEL=ollama/llama3

      # Groq
      # - GROQ_API_KEY=${GROQ_API_KEY}
      # - LLM_MODEL=groq/llama-3.1-8b-instant

      # Together
      # - TOGETHER_API_KEY=${TOGETHER_API_KEY}
      # - LLM_MODEL=together_ai/meta-llama/Llama-3-8b-chat-hf

      # ── LLM Settings ────────────────────────────────────────
      - LLM_TEMPERATURE=0
      - LLM_MAX_TOKENS=1024
      - LLM_FALLBACK_THRESHOLD=0.5
      - NLP_ENRICH_MISSING=${NLP_ENRICH_MISSING:-0}

      # ── Speech-to-Text (Deepgram) ─────────────────────────────
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}

      # ── Persistence (Redis) ──────────────────────────────────
      - REDIS_URL=redis://redis:6379/0
      - CONVERSATION_TTL=3600

      # ── Zasoby i ACL (nlp2dsl.yaml) ───────────────────────────
      - NLP2DSL_CONFIG=/app/nlp2dsl.yaml
      - NLP2DSL_AGENT_ID=${NLP2DSL_AGENT_ID:-user}
      - NLP2DSL_EXAMPLES_MOUNT=/examples
    depends_on:
      - redis
    volumes:
      - ./nlp-service/static:/app/static:ro
      - ./nlp2dsl.yaml:/app/nlp2dsl.yaml:ro
      - ./examples:/examples:ro
    restart: unless-stopped

  # ── Imperative Worker ────────────────────────────────────────
  worker:
    build: ./worker
    ports:
      - "${NLP2DSL_WORKER_HOST_PORT:-8004}:8000"
    restart: unless-stopped

  # ── Database ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: automation
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Cache / Queue ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  # ── (Opcjonalnie) Lokalny LLM ───────────────────────────────
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama

volumes:
  pgdata:
  # ollama_data:
