<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLP2DSL Voice Chat</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 1.8rem;
            color: #00d9ff;
        }
        
        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 8px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            background: #00d9ff22;
            border-left: 3px solid #00d9ff;
        }
        
        .message.assistant {
            background: #4ade8022;
            border-left: 3px solid #4ade80;
        }
        
        .message.system {
            background: #fbbf2422;
            border-left: 3px solid #fbbf24;
            font-size: 0.9rem;
        }
        
        .message-header {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.85rem;
            opacity: 0.8;
        }
        
        .message-content {
            line-height: 1.5;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .voice-btn {
            flex: 1;
            padding: 16px 24px;
            font-size: 1.1rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .voice-btn.start {
            background: linear-gradient(135deg, #00d9ff, #0099cc);
            color: white;
        }
        
        .voice-btn.stop {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }
        
        .voice-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(0, 217, 255, 0.3);
        }
        
        .voice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .text-input-container {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .text-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #333;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #eee;
            font-size: 1rem;
        }
        
        .text-input:focus {
            outline: none;
            border-color: #00d9ff;
        }
        
        .send-btn {
            padding: 12px 24px;
            background: #4ade80;
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .status {
            text-align: center;
            padding: 10px;
            font-size: 0.9rem;
            color: #888;
        }
        
        .status.connected {
            color: #4ade80;
        }
        
        .status.recording {
            color: #ef4444;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .mic-icon {
            width: 24px;
            height: 24px;
        }
        
        .workflow-preview {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
            font-family: monospace;
            font-size: 0.85rem;
            overflow-x: auto;
        }
        
        .form-fields {
            margin-top: 10px;
        }
        
        .form-field {
            margin-bottom: 10px;
        }
        
        .form-field label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .form-field input, .form-field select {
            width: 100%;
            padding: 10px;
            border: 1px solid #333;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.1);
            color: #eee;
        }
        
        audio {
            display: none;
        }
    </style>
</head>
<body onload="initVoice()">
    <div class="container">
        <header>
            <h1>🎤 NLP2DSL Voice Chat</h1>
            <p class="subtitle">Rozmawiaj naturalnie - system zrozumie i wykona</p>
        </header>
        
        <div class="status" id="status">Łączenie z serwerem...</div>
        
        <div class="chat-container" id="messages">
            <div class="message system">
                <div class="message-content">
                    👋 Witaj! Kliknij <strong>Start Voice</strong> aby rozpocząć rozmowę głosową, lub wpisz tekst poniżej.
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button class="voice-btn start" id="voiceBtn" onclick="toggleVoice()">
                <svg class="mic-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
                <span id="voiceBtnText">Start Voice</span>
            </button>
        </div>
        
        <div class="text-input-container">
            <input type="text" class="text-input" id="textInput" placeholder="Wpisz wiadomość..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendText()">Wyślij</button>
        </div>
        
        <audio id="player" autoplay></audio>
    </div>
    
    <script>
        let ws = null;
        let mediaRecorder = null;
        let audioStream = null;
        let isRecording = false;
        let conversationId = 'voice-' + Math.random().toString(36).substr(2, 9);
        
        // Auto-initialize on page load
        async function initVoice() {
            connectWebSocket();
            
            // Request microphone permission
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                console.log('Microphone access granted');
                updateStatus('Gotowy - kliknij Start Voice');
            } catch (e) {
                console.error('Microphone access denied:', e);
                updateStatus('Mikrofon niedostępny - użyj tekstu');
                document.getElementById('voiceBtn').disabled = true;
            }
        }
        
        // Connect to WebSocket
        function connectWebSocket() {
            const wsUrl = `${window.location.protocol === 'https:' ? 'wss:' : 'ws:'}//${window.location.host}/ws/chat/${conversationId}`;
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log('WebSocket connected');
                updateStatus('Połączono - gotowy do rozmowy', 'connected');
            };
            
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleWebSocketMessage(data);
                } catch (e) {
                    // Audio blob (TTS response)
                    if (event.data instanceof Blob) {
                        playAudio(event.data);
                    }
                }
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                updateStatus('Błąd połączenia');
            };
            
            ws.onclose = () => {
                console.log('WebSocket disconnected');
                updateStatus('Rozłączono - odśwież stronę');
                // Reconnect after 3 seconds
                setTimeout(connectWebSocket, 3000);
            };
        }
        
        // Handle WebSocket messages
        function handleWebSocketMessage(data) {
            if (data.type === 'transcript') {
                addMessage('user', data.text);
                
                if (data.response) {
                    const response = data.response;
                    
                    // Show assistant message
                    if (response.message) {
                        addMessage('assistant', response.message);
                    }
                    
                    // Show workflow preview
                    if (response.dsl) {
                        showWorkflowPreview(response.dsl);
                    }
                    
                    // Show form if missing fields
                    if (response.missing && response.missing.length > 0) {
                        showFormPrompt(response);
                    }
                }
            }
        }
        
        // Toggle voice recording
        async function toggleVoice() {
            const btn = document.getElementById('voiceBtn');
            const btnText = document.getElementById('voiceBtnText');
            
            if (!isRecording) {
                // Start recording
                if (!audioStream) {
                    try {
                        audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    } catch (e) {
                        alert('Mikrofon niedostępny');
                        return;
                    }
                }
                
                mediaRecorder = new MediaRecorder(audioStream, {
                    mimeType: 'audio/webm;codecs=opus'
                });
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0 && ws.readyState === WebSocket.OPEN) {
                        ws.send(event.data);
                    }
                };
                
                mediaRecorder.start(250); // 250ms chunks
                isRecording = true;
                
                btn.className = 'voice-btn stop';
                btnText.textContent = 'Stop Voice';
                updateStatus('Nagrywanie... mów teraz', 'recording');
                
            } else {
                // Stop recording
                if (mediaRecorder) {
                    mediaRecorder.stop();
                }
                isRecording = false;
                
                btn.className = 'voice-btn start';
                btnText.textContent = 'Start Voice';
                updateStatus('Przetwarzanie...', 'connected');
            }
        }
        
        // Send text message
        function sendText() {
            const input = document.getElementById('textInput');
            const text = input.value.trim();
            
            if (!text) return;
            
            addMessage('user', text);
            
            // Send via HTTP POST (fallback if WebSocket not available)
            fetch('/chat/message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `conversation_id=${conversationId}&text=${encodeURIComponent(text)}`
            })
            .then(response => response.json())
            .then(data => {
                if (data.message) {
                    addMessage('assistant', data.message);
                }
                if (data.dsl) {
                    showWorkflowPreview(data.dsl);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                addMessage('system', 'Błąd wysyłania wiadomości');
            });
            
            input.value = '';
        }
        
        // Handle Enter key
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendText();
            }
        }
        
        // Add message to chat
        function addMessage(role, content) {
            const container = document.getElementById('messages');
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            
            const header = document.createElement('div');
            header.className = 'message-header';
            header.textContent = role === 'user' ? '👤 Ty' : role === 'assistant' ? '🤖 System' : 'ℹ️ Info';
            
            const body = document.createElement('div');
            body.className = 'message-content';
            body.textContent = content;
            
            msg.appendChild(header);
            msg.appendChild(body);
            container.appendChild(msg);
            
            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        }
        
        // Show workflow preview
        function showWorkflowPreview(dsl) {
            const container = document.getElementById('messages');
            const preview = document.createElement('div');
            preview.className = 'message assistant';
            
            const header = document.createElement('div');
            header.className = 'message-header';
            header.textContent = '📋 Workflow DSL';
            
            const body = document.createElement('div');
            body.className = 'workflow-preview';
            body.textContent = JSON.stringify(dsl, null, 2);
            
            preview.appendChild(header);
            preview.appendChild(body);
            container.appendChild(preview);
            container.scrollTop = container.scrollHeight;
        }
        
        // Show form prompt for missing fields
        function showFormPrompt(response) {
            const container = document.getElementById('messages');
            const form = document.createElement('div');
            form.className = 'message assistant';
            
            const header = document.createElement('div');
            header.className = 'message-header';
            header.textContent = '📝 Wymagane dane';
            
            const body = document.createElement('div');
            body.className = 'form-fields';
            
            response.missing.forEach(field => {
                const fieldDiv = document.createElement('div');
                fieldDiv.className = 'form-field';
                
                const label = document.createElement('label');
                label.textContent = field;
                
                const input = document.createElement('input');
                input.type = 'text';
                input.placeholder = field;
                input.id = `field-${field}`;
                
                fieldDiv.appendChild(label);
                fieldDiv.appendChild(input);
                body.appendChild(fieldDiv);
            });
            
            form.appendChild(header);
            form.appendChild(body);
            container.appendChild(form);
            container.scrollTop = container.scrollHeight;
        }
        
        // Play audio (TTS response)
        function playAudio(blob) {
            const player = document.getElementById('player');
            player.src = URL.createObjectURL(blob);
            player.play();
        }
        
        // Update status
        function updateStatus(text, className = '') {
            const status = document.getElementById('status');
            status.textContent = text;
            status.className = 'status ' + className;
        }
    </script>
</body>
</html>
